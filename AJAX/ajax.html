<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/ajax.css">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Players</title>
</head>

<body>
    <header>


        <div class="cabecera-texto">
            <h1>Minecraft Server</h1>
            <h2>Players</h2>
        </div>
        <nav>
            <a href="./ajax.html" class="activo">Players</a>
            <a href="../Formularios/contact.html">Contacto</a>
        </nav>
    </header>

    <main>
        <video autoplay muted loop class="panorama">
            <source src="../css/Panoramico.mp4" type="video/mp4">
        </video>
        <div class="bar">
            <label>
                Filtrar:
                <input id="filter" type="search" placeholder="Buscar jugador..." autocomplete="off" />
            </label>
            <span id="count" class="muted"></span>
        </div>

        <table class="players" aria-label="Listado de jugadores">
            <thead>
                <tr>
                    <th>Jugador</th>
                    <th>Modo de Juego</th>
                    <th>Rango</th>
                    <th>Mundo</th>
                    <th>Posición</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr>
                    <td colspan="6" class="muted">Cargando...</td>
                </tr>
            </tbody>
        </table>

        <section class="detail" aria-label="Detalle del jugador seleccionado">
            <h3 style="margin:0 0 10px;">Detalles</h3>
            <div id="detailContent" class="muted">Selecciona un jugador de la tabla.</div>
        </section>

        <script src="./ajax.js"></script>
    </main>
    <footer>
        <p>Página creada por Jesús Ponce</p>
    </footer>
</body>

</html>
